# ============================================================================
# OrthoPlus Nginx Configuration - Production Hardened
# ============================================================================
# This configuration provides:
# - TLS 1.3 with strong cipher suites
# - Rate limiting at multiple levels
# - Security headers
# - Reverse proxy for frontend and backend
# - MinIO S3 API proxy
# ============================================================================

# Performance tuning
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Hide Nginx version

    # MIME Types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Rate Limiting Zones
    # Zone 1: Global rate limiting (100 req/s per IP)
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/s;

    # Zone 2: API rate limiting (30 req/s per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Zone 3: Authentication endpoints (5 req/min per IP)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Zone 4: File upload limiting (10 req/min per IP)
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    # Connection limiting (10 concurrent connections per IP)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Client body size (for file uploads - DICOM, X-Rays, etc.)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Upstream Backend Services
    upstream backend {
        least_conn;  # Load balancing method
        server backend:3005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        server orthoplus:80;
        keepalive 16;
    }

    # Reject requests with unknown Host headers (default_server catch-all)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        listen 443 default_server ssl;
        listen [::]:443 default_server ssl;
        server_name _;
        # Use a self-signed/dummy cert for the default block to absorb TLS probes.
        # ssl_certificate /etc/nginx/ssl/default.crt;
        # ssl_certificate_key /etc/nginx/ssl/default.key;
        return 444;
    }

    # HTTP Server (Redirect to HTTPS)
    server {
        listen 80;
        listen [::]:80;
        # ╔══════════════════════════════════════════════════════════════╗
        # ║  PRODUCTION REQUIRED: Replace with your actual domain name  ║
        # ║  Example: server_name orthoplus.com.br;                     ║
        # ║  Must match the SSL certificate domain.                     ║
        # ╚══════════════════════════════════════════════════════════════╝
        server_name orthoplus.i9corp.com.br;

        # Let's Encrypt ACME challenge
        location ^~ /.well-known/acme-challenge/ {
            default_type "text/plain";
            root /var/www/certbot;
        }

        # Health check endpoint (no redirect)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        # ╔══════════════════════════════════════════════════════════════╗
        # ║  PRODUCTION REQUIRED: Replace with your actual domain name  ║
        # ║  Example: server_name orthoplus.com.br;                     ║
        # ║  Must match the SSL certificate domain.                     ║
        # ╚══════════════════════════════════════════════════════════════╝
        server_name orthoplus.i9corp.com.br;

        # SSL/TLS Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_dhparam /etc/nginx/dhparam.pem;

        # TLS 1.3 only (or TLS 1.2+ if compatibility needed)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # SSL Session Cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # SECURITY NOTE: 'unsafe-inline' and 'unsafe-eval' in script-src weaken XSS protection.
        # These are currently required by the React/Vite bundle and third-party libraries.
        # TODO: Migrate to nonce-based or hash-based CSP to eliminate 'unsafe-inline'/'unsafe-eval'
        # when the frontend build pipeline supports it. See: https://content-security-policy.com/nonce/
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

        # Global rate limiting and connection limiting
        limit_req zone=global_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Backend API (/api/*)
        location /api/ {
            # API-specific rate limiting
            limit_req zone=api_limit burst=10 nodelay;

            # Authentication endpoints (stricter rate limit)
            location ~ ^/api/(auth|login|register) {
                limit_req zone=auth_limit burst=3 nodelay;
                proxy_pass http://backend;
                include /etc/nginx/proxy_params;
            }

            # File upload endpoints
            location ~ ^/api/(upload|files) {
                limit_req zone=upload_limit burst=5 nodelay;
                client_max_body_size 50M;
                proxy_pass http://backend;
                include /etc/nginx/proxy_params;
            }

            # All other API endpoints
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # Frontend SPA (React App)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
