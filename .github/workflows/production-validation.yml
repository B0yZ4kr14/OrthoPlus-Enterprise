name: Production Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate Production Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make validation script executable
        run: chmod +x ./scripts/validate-production.sh

      - name: Run production validation (dry-run with test env)
        env:
          NODE_ENV: production
          PORT: "3005"
          JWT_SECRET: "ci-dry-run-secret-placeholder-32chars!!"
          AUTH_ALLOW_MOCK: "false"
          ENABLE_DANGEROUS_ADMIN_ENDPOINTS: "false"
          DB_SSL: "true"
          DATABASE_URL: "postgresql://user:pass@localhost:5432/orthoplus?sslmode=require"
          REDIS_PASSWORD: "ci-redis-password-placeholder"
          ALLOWED_ORIGINS: "https://example.com"
        run: ./scripts/validate-production.sh

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit frontend dependencies
        # Only critical vulnerabilities block the pipeline; high-severity ones should be triaged regularly
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Audit backend dependencies
        # Only critical vulnerabilities block the pipeline; high-severity ones should be triaged regularly
        run: cd backend && npm audit --audit-level=critical
        continue-on-error: true

  build-production:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend (production)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: "https://example.com/api"

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend (production)
        run: cd backend && npm run build
        env:
          NODE_ENV: production
