# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# The zimperium-zscan GitHub action scans your mobile app binary (iOS or Android)
# and identifies security, privacy, and compliance-related vulnerabilities. ​
#
# Prerequisites:
#  * An active Zimperium zScan account is required. If you are not an existing Zimperium
#    zScan customer, please request a zSCAN demo by visiting https://www.zimperium.com/contact-us.
#  * Either GitHub Advanced Security (GHAS) or a public repository is required to display
#    issues and view the remediation information inside of GitHub code scanning alerts.​
#
# Para configurar este workflow, defina os seguintes secrets no repositório GitHub:
#  * ZSCAN_CLIENT_SECRET — Client secret obtido no console do Zimperium zScan
#  * Atualize também client_env e client_id abaixo com os valores da sua conta
#
# Se o zScan não estiver configurado ou não for necessário (ex: apenas app web),
# este workflow pode ser desabilitado sem impacto no pipeline principal.
# continue-on-error: true está definido para não bloquear o pipeline caso o zScan falhe.
#
# For additional information and setup instructions
# please visit:  https://github.com/Zimperium/zScanMarketplace#readme

name: "Zimperium zScan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  zscan:
    name: zScan
    runs-on: ubuntu-latest
    # continue-on-error: true evita que falhas do zScan bloqueiem o pipeline principal.
    # Remova ou defina como false quando o Zimperium estiver totalmente configurado.
    continue-on-error: true
    permissions:
      contents: read          # for actions/checkout to fetch code
      security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read           # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Build project
      run: npm run build
      env:
        VITE_API_BASE_URL: ""

    - name: Run Zimperium zScan
      uses: zimperium/zscanmarketplace@bfc6670f6648d796098c251ccefcfdb98983174d
      timeout-minutes: 60
      with:
        # REPLACE: Zimperium Client Environment Name (obtido no console do Zimperium)
        client_env: env_string
        # REPLACE: Zimperium Client ID (obtido no console do Zimperium)
        client_id: id_string
        # Secret configurado em: Settings → Secrets and Variables → Actions → ZSCAN_CLIENT_SECRET
        client_secret: ${{ secrets.ZSCAN_CLIENT_SECRET }}
        # REPLACE: The path to an .ipa or .apk
        app_file: app-release-unsigned.apk

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: Zimperium.sarif
