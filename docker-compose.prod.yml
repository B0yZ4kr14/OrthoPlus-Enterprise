# ============================================================================
# OrthoPlus — Production Docker Compose
# ============================================================================
# NOTE: PostgreSQL is intentionally NOT included here.
# PostgreSQL is expected to be hosted on a managed external database service
# (e.g., AWS RDS, Google Cloud SQL, Supabase, or a dedicated VM).
# Configure the connection via the DATABASE_URL environment variable in
# .env.production. See .env.production.example for the required format.
# ============================================================================

services:
  backend:
    image: orthoplus/backend:latest
    container_name: orthoplus-backend
    restart: always
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - orthoplus-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (r) => { if (r.statusCode !== 200) process.exit(1); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  orthoplus:
    image: orthoplus/frontend:latest
    container_name: orthoplus-app
    restart: always
    networks:
      - orthoplus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: orthoplus-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - orthoplus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: orthoplus-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - orthoplus
    networks:
      - orthoplus-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:

networks:
  orthoplus-network:
    driver: bridge
