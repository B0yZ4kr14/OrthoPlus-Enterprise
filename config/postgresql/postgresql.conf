# ============================================================================
# PostgreSQL Configuration - Optimized for OrthoPlus Enterprise
# Ubuntu Server LTS - Production Environment
# ============================================================================
# This file is mounted into the postgres container via docker-compose.ubuntu.yml
# Path: /etc/postgresql/postgresql.conf
# ============================================================================

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Listen on all interfaces (Docker networking)
listen_addresses = '*'

# Maximum connections - suitable for small to medium clinics
max_connections = 200

#------------------------------------------------------------------------------
# RESOURCE USAGE (except WAL)
#------------------------------------------------------------------------------

# Shared memory for PostgreSQL - 25% of total RAM recommended
# For a 4GB server: 256MB is a good starting point
shared_buffers = 256MB

# Effective cache size - estimate of OS cache + PG shared buffers
# For a 4GB server: 1GB is conservative
 effective_cache_size = 1GB

# Memory for maintenance operations (VACUUM, CREATE INDEX, etc.)
maintenance_work_mem = 64MB

# Memory per query operation (sort, hash join, etc.)
# Total used = work_mem * max_connections (worst case)
work_mem = 4MB

# Memory for vacuum operations per autovacuum worker
autovacuum_work_mem = -1  # Use maintenance_work_mem

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL)
#------------------------------------------------------------------------------

# WAL level - replica allows for streaming replication if needed later
wal_level = replica

# Sync method - fsync is safest
fsync = on

# WAL sync method
wal_sync_method = fsync

# Full page writes - always on for data safety
full_page_writes = on

# Checkpoint settings for better performance
checkpoint_timeout = 5min
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# WAL buffers
wal_buffers = 16MB

# Commit delay for batch operations
commit_delay = 0
commit_siblings = 5

#------------------------------------------------------------------------------
# QUERY PLANNER
#------------------------------------------------------------------------------

# Random page cost - lower for SSD storage
random_page_cost = 1.1

# Effective I/O concurrency
# Higher for SSD, lower for HDD
effective_io_concurrency = 200

# Default statistics target
default_statistics_target = 100

# Constraint exclusion
constraint_exclusion = partition

# Cursor tuple fraction
cursor_tuple_fraction = 0.1

#------------------------------------------------------------------------------
# REPORTING AND LOGGING
#------------------------------------------------------------------------------

# Logging collector
logging_collector = on

# Log directory
log_directory = '/var/log/postgresql'

# Log filename pattern
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# Log rotation
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = off

# Minimum log level
log_min_messages = warning

# Slow query logging (queries > 1 second)
log_min_duration_statement = 1000

# Log connections/disconnections
log_connections = on
log_disconnections = on

# Log checkpoints
log_checkpoints = on

# Log lock waits
log_lock_waits = on

# Log line prefix
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------

# Enable autovacuum
autovacuum = on

# Autovacuum max workers
autovacuum_max_workers = 3

# Nap time between runs
autovacuum_naptime = 1min

# Vacuum threshold
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.2

# Analyze threshold
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.1

#------------------------------------------------------------------------------
# LOCALE AND FORMATTING
#------------------------------------------------------------------------------

# Date style
datestyle = 'iso, dmy'

# Timezone
timezone = 'America/Sao_Paulo'

# Locale settings
lc_messages = 'en_US.UTF-8'
lc_monetary = 'pt_BR.UTF-8'
lc_numeric = 'pt_BR.UTF-8'
lc_time = 'pt_BR.UTF-8'

# Default text search config
default_text_search_config = 'pg_catalog.portuguese'

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

# Deadlock timeout
deadlock_timeout = 1s

# Lock timeout (0 = disable)
lock_timeout = 0

# Statement timeout (0 = disable)
statement_timeout = 0

#------------------------------------------------------------------------------
# VERSION AND PLATFORM COMPATIBILITY
#------------------------------------------------------------------------------

# Bytea output format
bytea_output = 'hex'

# XML binary mode
xmlbinary = 'base64'

# XML option
xmloption = 'content'

#------------------------------------------------------------------------------
# ERROR HANDLING
#------------------------------------------------------------------------------

# Exit on error - don't use in production
exit_on_error = off

# Restart after crash
restart_after_crash = on

#------------------------------------------------------------------------------
# CONFIGURATION INCLUDE
#------------------------------------------------------------------------------

# Include additional configs if needed
#include_dir = 'conf.d'
